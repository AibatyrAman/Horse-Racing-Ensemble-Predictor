# TJK Paneli — nginx reverse proxy (Streamlit 127.0.0.1:8501 → PANEL_DOMAIN)
# Kurulum: PANEL_DOMAIN'i değiştir → sites-available/tjk → certbot HTTPS ekler.
# Basic auth TÜM paneli korur (İşlemler/scrape/retrain butonları dahil).

server {
    listen 80;
    server_name PANEL_DOMAIN;

    # Şifre koruması (htpasswd ile oluştur: sudo htpasswd -c /etc/nginx/.htpasswd admin)
    auth_basic           "TJK Paneli";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # Streamlit WebSocket (canlı arayüz için ŞART)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Uzun süren WebSocket bağlantıları kopmasın
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}

# Not: `sudo certbot --nginx -d PANEL_DOMAIN` çalıştırınca certbot bu bloğu otomatik
# 443/HTTPS'e yükseltir ve HTTP'yi HTTPS'e yönlendirir.
