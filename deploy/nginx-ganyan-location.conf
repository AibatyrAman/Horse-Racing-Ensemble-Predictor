# ─────────────────────────────────────────────────────────────
#  TJK Paneli — nginx location bloğu (aizho.me/ganyan)
# ─────────────────────────────────────────────────────────────
#  Kullanım: Bu bloğu mevcut /etc/nginx/sites-available/aizho.me
#  server { ... } bloğunun İÇİNE yapıştır.
#
#  Şifre koruması istenirse auth_basic satırlarını aç (# kaldır).
# ─────────────────────────────────────────────────────────────

    # ── TJK Tahmin Paneli (/ganyan) ──────────────────────────
    # Opsiyonel: Şifre koruması
    # auth_basic           "TJK Paneli";
    # auth_basic_user_file /etc/nginx/.htpasswd_ganyan;

    location /ganyan/ {
        proxy_pass http://127.0.0.1:8501/ganyan/;
        proxy_http_version 1.1;

        # Streamlit WebSocket desteği (canlı arayüz için ŞART)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Uzun süren WebSocket bağlantıları kopmasın
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # Streamlit statik dosyaları (/_stcore) — /ganyan altında otomatik çalışır
    # ama WebSocket path'i için de aynı proxy gerekli:
    location /ganyan/_stcore/ {
        proxy_pass http://127.0.0.1:8501/ganyan/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
